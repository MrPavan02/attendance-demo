<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Connection Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-result {
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid;
        }
        .success {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }
        .info {
            background: #d1ecf1;
            border-color: #17a2b8;
            color: #0c5460;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Backend Connection Test</h1>
    <p>This page tests the connection to the backend API at <strong>http://localhost:8000</strong></p>
    
    <div>
        <button onclick="testConnection()">Test Backend Connection</button>
        <button onclick="testLogin()">Test Login API</button>
        <button onclick="clearResults()">Clear Results</button>
    </div>

    <div id="results"></div>

    <script>
        const API_BASE = 'http://localhost:8000/api/v1';

        function addResult(type, title, message, details = null) {
            const resultsDiv = document.getElementById('results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `test-result ${type}`;
            
            let html = `<h3>${title}</h3><p>${message}</p>`;
            if (details) {
                html += `<pre>${JSON.stringify(details, null, 2)}</pre>`;
            }
            
            resultDiv.innerHTML = html;
            resultsDiv.insertBefore(resultDiv, resultsDiv.firstChild);
        }

        async function testConnection() {
            addResult('info', 'Testing...', 'Attempting to connect to backend...');
            
            try {
                const response = await fetch(`${API_BASE}/auth/me`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                addResult('success', 'Connection Successful!', 
                    `Backend is reachable. Status: ${response.status} ${response.statusText}`,
                    {
                        status: response.status,
                        statusText: response.statusText,
                        headers: Object.fromEntries(response.headers.entries())
                    }
                );

                // Read response body
                const text = await response.text();
                try {
                    const json = JSON.parse(text);
                    addResult('success', 'Response Received', 
                        'Backend returned valid JSON',
                        json
                    );
                } catch (e) {
                    addResult('error', 'JSON Parse Error', 
                        'Backend returned non-JSON response',
                        { response: text.substring(0, 500) }
                    );
                }

            } catch (error) {
                addResult('error', 'Connection Failed!', 
                    `Cannot reach backend: ${error.message}`,
                    {
                        error: error.toString(),
                        name: error.name,
                        message: error.message
                    }
                );
            }
        }

        async function testLogin() {
            addResult('info', 'Testing Login...', 'Attempting login with test credentials...');
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        employee_id: 'EMP002',
                        password: 'pass'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    addResult('success', 'Login Successful!', 
                        'Login API is working correctly',
                        data
                    );
                } else {
                    addResult('error', 'Login Failed', 
                        `Status: ${response.status}`,
                        data
                    );
                }

            } catch (error) {
                addResult('error', 'Login Test Failed!', 
                    `Error: ${error.message}`,
                    {
                        error: error.toString(),
                        name: error.name,
                        message: error.message
                    }
                );
            }
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        // Auto-test on load
        window.addEventListener('load', () => {
            setTimeout(testConnection, 500);
        });
    </script>
</body>
</html>
