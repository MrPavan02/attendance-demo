<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Auth Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .test { background: white; padding: 15px; margin: 10px 0; border-radius: 5px; border-left: 4px solid #999; }
        .pass { border-left-color: #0a0; color: #0a0; }
        .fail { border-left-color: #a00; color: #a00; }
        .info { border-left-color: #00a; color: #00a; }
        pre { background: #f0f0f0; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
<h1>Frontend Authentication Test</h1>
<div id="results"></div>

<script>
const BASE_URL = 'http://localhost:8000/api/v1';
const resultsDiv = document.getElementById('results');

function addResult(title, status, message, details = '') {
    const className = status === 'pass' ? 'pass' : status === 'fail' ? 'fail' : 'info';
    const html = `
        <div class="test ${className}">
            <strong>${title}</strong>: ${message}
            ${details ? `<pre>${details}</pre>` : ''}
        </div>
    `;
    resultsDiv.innerHTML += html;
}

async function testLogin() {
    try {
        addResult('Login Test', 'info', 'Attempting login...');
        
        const response = await fetch(`${BASE_URL}/auth/login`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                employee_id: 'EMP001',
                password: 'admin123'
            })
        });

        if (!response.ok) {
            addResult('Login Test', 'fail', `HTTP ${response.status}`, response.statusText);
            return;
        }

        const data = await response.json();
        if (data.access_token) {
            addResult('Login Test', 'pass', 'Login successful!', `Token: ${data.access_token.substring(0, 50)}...`);
            
            // Now test getting user info
            await testUserInfo(data.access_token);
        } else {
            addResult('Login Test', 'fail', 'No token in response', JSON.stringify(data));
        }
    } catch (error) {
        addResult('Login Test', 'fail', `Error: ${error.message}`);
    }
}

async function testUserInfo(token) {
    try {
        addResult('User Info Test', 'info', 'Fetching user info...');
        
        const response = await fetch(`${BASE_URL}/auth/me`, {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });

        if (!response.ok) {
            addResult('User Info Test', 'fail', `HTTP ${response.status}`, response.statusText);
            return;
        }

        const data = await response.json();
        addResult('User Info Test', 'pass', 'User info retrieved!', JSON.stringify(data, null, 2));
    } catch (error) {
        addResult('User Info Test', 'fail', `Error: ${error.message}`);
    }
}

// Start tests
addResult('Environment', 'info', `Testing against: ${BASE_URL}`);
testLogin();
</script>
</body>
</html>
