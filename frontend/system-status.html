<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Status Check</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { 
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        h1 { color: #333; margin-bottom: 30px; font-size: 28px; }
        .status-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            background: #f5f5f5;
            font-weight: 500;
        }
        .status-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            color: white;
            font-size: 18px;
            flex-shrink: 0;
        }
        .icon-pass { background: #4caf50; }
        .icon-fail { background: #f44336; }
        .icon-loading { background: #2196f3; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .text { flex: 1; }
        .label { color: #666; font-size: 12px; text-transform: uppercase; margin-bottom: 3px; }
        .value { color: #333; }
        .failure-reason { color: #d32f2f; font-size: 12px; margin-top: 5px; }
        .actions {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn:hover { background: #764ba2; }
        .btn:active { transform: scale(0.98); }
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 13px;
            color: #1565c0;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔍 System Status Check</h1>
    <div id="status-list"></div>
    <div class="actions">
        <button class="btn" onclick="retryChecks()">Retry Checks</button>
        <button class="btn" onclick="window.location='/'" style="background: #28a745;">Go to Login</button>
    </div>
    <div class="info-box">
        <strong>ℹ️ Info:</strong> If all checks pass, you can login with:<br>
        • Administrator: EMP001 / admin123<br>
        • Employee: EMP002 / emp123
    </div>
</div>

<script>
const statusList = document.getElementById('status-list');
const BASE_URL = 'http://localhost:8000/api/v1';

function addStatus(label, status, value = '', reason = '') {
    const iconClass = status === 'pass' ? 'icon-pass' : status === 'fail' ? 'icon-fail' : 'icon-loading';
    const icon = status === 'pass' ? '✓' : status === 'fail' ? '✗' : '⟳';
    const html = `
        <div class="status-item">
            <div class="status-icon ${iconClass}">${icon}</div>
            <div class="text">
                <div class="label">${label}</div>
                <div class="value">${value}</div>
                ${reason ? `<div class="failure-reason">${reason}</div>` : ''}
            </div>
        </div>
    `;
    statusList.innerHTML += html;
}

async function runChecks() {
    statusList.innerHTML = '';
    
    // Check 1: Backend reachability
    addStatus('Backend API', 'loading', 'Checking connection...');
    try {
        const response = await fetch(`${BASE_URL}/auth/login`, {
            method: 'GET',
            headers: { 'Content-Type': 'application/json' }
        });
        const items = document.querySelectorAll('.status-item');
        items[0].replaceWith(createStatusItem('Backend API', 'pass', 'Connected on port 8000'));
    } catch (e) {
        const items = document.querySelectorAll('.status-item');
        items[0].replaceWith(createStatusItem('Backend API', 'fail', 'Cannot connect', 
            'Backend server not responding. Make sure it\'s running on port 8000'));
        return;
    }
    
    // Check 2: Test login
    addStatus('Login Endpoint', 'loading', 'Testing authentication...');
    try {
        const loginResp = await fetch(`${BASE_URL}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ employee_id: 'EMP001', password: 'admin123' })
        });
        
        const responseText = await loginResp.text();
        console.log('Login response status:', loginResp.status);
        console.log('Login response body:', responseText);
        
        if (loginResp.ok) {
            const response = JSON.parse(responseText);
            console.log('Parsed response:', response);
            
            // Extract token from nested structure
            let accessToken = null;
            let user = null;
            
            // Try different token locations
            if (response.data?.access_token) {
                accessToken = response.data.access_token;
                user = response.data.user;
            } else if (response.access_token) {
                accessToken = response.access_token;
                user = response.user;
            }
            
            console.log('Extracted token:', accessToken ? 'found' : 'NOT FOUND');
            console.log('Extracted user:', user);
            
            if (accessToken && user) {
                const items = document.querySelectorAll('.status-item');
                items[1].replaceWith(createStatusItem('Login Endpoint', 'pass', 'Authentication working'));
                
                // Check 3: User info
                addStatus('User Data', 'loading', 'Retrieving user info...');
                const meResp = await fetch(`${BASE_URL}/auth/me`, {
                    headers: { 
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (meResp.ok) {
                    const meText = await meResp.text();
                    const meResponse = JSON.parse(meText);
                    const meUser = meResponse.data || meResponse;
                    const items2 = document.querySelectorAll('.status-item');
                    items2[2].replaceWith(createStatusItem('User Data', 'pass', 
                        `Loaded: ${meUser.name}`));
                    
                    // Check 4: Attendance status
                    addStatus('Attendance Data', 'loading', 'Checking attendance...');
                    const statusResp = await fetch(`${BASE_URL}/attendance/status/${meUser.employee_id}`, {
                        headers: { 
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (statusResp.ok) {
                        const items3 = document.querySelectorAll('.status-item');
                        items3[3].replaceWith(createStatusItem('Attendance Data', 'pass', 'Data accessible'));
                    } else {
                        console.warn('Attendance status check failed:', statusResp.status);
                    }
                } else {
                    console.warn('User info request failed:', meResp.status);
                }
            } else {
                const items = document.querySelectorAll('.status-item');
                items[1].replaceWith(createStatusItem('Login Endpoint', 'fail', 'Token missing', 
                    'Token not found in response. Response: ' + JSON.stringify(response).substring(0, 100)));
            }
        } else {
            const items = document.querySelectorAll('.status-item');
            items[1].replaceWith(createStatusItem('Login Endpoint', 'fail', 'Auth failed', 
                loginResp.status + ': ' + loginResp.statusText));
        }
    } catch (e) {
        console.error('Login error:', e);
        const items = document.querySelectorAll('.status-item');
        items[1].replaceWith(createStatusItem('Login Endpoint', 'fail', 'Error', e.message));
    }
}

function createStatusItem(label, status, value, reason) {
    const iconClass = status === 'pass' ? 'icon-pass' : 'icon-fail';
    const icon = status === 'pass' ? '✓' : '✗';
    const div = document.createElement('div');
    div.className = 'status-item';
    div.innerHTML = `
        <div class="status-icon ${iconClass}">${icon}</div>
        <div class="text">
            <div class="label">${label}</div>
            <div class="value">${value}</div>
            ${reason ? `<div class="failure-reason">${reason}</div>` : ''}
        </div>
    `;
    return div;
}

function retryChecks() {
    runChecks();
}

runChecks();
</script>
</body>
</html>
