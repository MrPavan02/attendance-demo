<!DOCTYPE html>
<html>
<head>
    <title>Backend Connection Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .success { color: green; }
        .error { color: red; }
        button { padding: 10px 20px; margin: 10px 0; font-size: 16px; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Backend Connection Test</h1>
    <button onclick="testBackend()">Test Backend Connection</button>
    <button onclick="testLogin()">Test Login (EMP001/admin123)</button>
    <button onclick="clearCache()">Clear All Cache & Reload</button>
    <div id="result"></div>

    <script>
        async function testBackend() {
            const result = document.getElementById('result');
            result.innerHTML = '<p>Testing backend connection...</p>';
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/health', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                result.innerHTML = `
                    <p class="success">✅ Backend is reachable!</p>
                    <p>Status: ${response.status}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (err) {
                result.innerHTML = `
                    <p class="error">❌ Cannot reach backend</p>
                    <p>Error: ${err.message}</p>
                    <p>This means your browser cannot connect to http://localhost:8000</p>
                    <p><strong>Possible fixes:</strong></p>
                    <ul>
                        <li>Hard refresh the page: Ctrl+Shift+R or Ctrl+F5</li>
                        <li>Clear browser cache completely</li>
                        <li>Try opening in Incognito/Private mode</li>
                        <li>Check browser console (F12) for CORS errors</li>
                        <li>Disable browser extensions temporarily</li>
                        <li>Check if antivirus/firewall is blocking localhost</li>
                    </ul>
                `;
                console.error('Fetch error details:', err);
            }
        }

        async function testLogin() {
            const result = document.getElementById('result');
            result.innerHTML = '<p>Testing login...</p>';
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        employee_id: 'EMP001',
                        password: 'admin123'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.innerHTML = `
                        <p class="success">✅ Login successful!</p>
                        <p>Status: ${response.status}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                        <p><strong>Backend is working correctly!</strong></p>
                        <p>If the main app still doesn't work, try clearing cache and reloading.</p>
                    `;
                } else {
                    result.innerHTML = `
                        <p class="error">❌ Login failed</p>
                        <p>Status: ${response.status}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (err) {
                result.innerHTML = `
                    <p class="error">❌ Cannot reach backend for login</p>
                    <p>Error: ${err.message}</p>
                `;
                console.error('Login error:', err);
            }
        }

        function clearCache() {
            // Clear localStorage
            localStorage.clear();
            sessionStorage.clear();
            
            // Clear service workers if any
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for(let registration of registrations) {
                        registration.unregister();
                    }
                });
            }
            
            // Clear cache storage
            if ('caches' in window) {
                caches.keys().then(function(names) {
                    for (let name of names) {
                        caches.delete(name);
                    }
                });
            }
            
            alert('Cache cleared! Page will reload in 2 seconds...');
            setTimeout(() => {
                window.location.reload(true);
            }, 2000);
        }

        // Auto-test on load
        window.onload = () => {
            testBackend();
        };
    </script>
</body>
</html>
